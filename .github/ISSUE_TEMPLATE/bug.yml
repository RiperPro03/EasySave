name: Bug
description: Un comportement ne fonctionne pas
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: "1) ...\n2) ...\n3) ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Résultat obtenu
    validations:
      required: true
