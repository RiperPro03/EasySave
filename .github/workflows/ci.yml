name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: "Release"
  RUNTIME: win-x64

jobs:
  # -------------------------
  # STAGE 0 — Detect changes
  # -------------------------
  detect_changes:
    name: "Stage 0 - Detect changes (code)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - name: "Detect code changes"
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "**/*.sln"
              - "**/*.csproj"
              - "**/*.cs"
              - "Directory.Build.props"
              - "Directory.Build.targets"
              - ".editorconfig"

  # -------------------------
  # STAGE 1 — Unit tests
  # -------------------------
  unit_tests:
    name: "Stage 1 - Unit tests"
    needs: detect_changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.detect_changes.outputs.code_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Cache NuGet
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Restore"
        run: dotnet restore

      - name: "Test"
        run: dotnet test -c ${{ env.CONFIGURATION }} --verbosity normal

  # -------------------------
  # STAGE 2 — Build (only if tests OK)
  # -------------------------
  build:
    name: "Stage 2 - Build"
    needs: [detect_changes, unit_tests]
    if: startsWith(github.ref, 'refs/tags/v') || needs.detect_changes.outputs.code_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: "Setup .NET"
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Cache NuGet
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Restore"
        run: dotnet restore

      - name: "Build"
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

  # -------------------------
  # STAGE 3 — Package (.exe) (ONLY ON TAG RELEASE)
  # -------------------------
  package:
    name: "Stage 3 - Package (.exe)"
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # --- Console ---
      - name: "Publish Console"
        run: >
          dotnet publish src/EasySave.App.Console/EasySave.App.Console.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained false
          /p:PublishSingleFile=true
          /p:DebugType=None
          -o ./out/publish/console

      - name: "Zip Console"
        shell: pwsh
        run: |
          Compress-Archive -Path out/publish/console/* -DestinationPath EasySave-Console-${{ env.RUNTIME }}.zip -Force

      - name: "Upload Console artifact"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: EasySave-Console-${{ env.RUNTIME }}
          path: EasySave-Console-${{ env.RUNTIME }}.zip

      # --- GUI (Avalonia) ---
      - name: "Publish GUI"
        run: >
          dotnet publish src/EasySave.App.Gui/EasySave.App.Gui.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained false
          /p:PublishSingleFile=true
          /p:DebugType=None
          -o ./out/publish/gui

      - name: "Zip GUI"
        shell: pwsh
        run: |
          Compress-Archive -Path out/publish/gui/* -DestinationPath EasySave-GUI-${{ env.RUNTIME }}.zip -Force

      - name: "Upload GUI artifact"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: EasySave-GUI-${{ env.RUNTIME }}
          path: EasySave-GUI-${{ env.RUNTIME }}.zip

  # -------------------------
  # STAGE 4 — GitHub Release (attach zip) (ONLY ON TAG RELEASE)
  # -------------------------
  release:
    name: "Stage 4 - GitHub Release"
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v') && needs.package.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Download Console artifact"
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: EasySave-Console-${{ env.RUNTIME }}

      - name: "Download GUI artifact"
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: EasySave-GUI-${{ env.RUNTIME }}

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: |
            EasySave-Console-${{ env.RUNTIME }}.zip
            EasySave-GUI-${{ env.RUNTIME }}.zip
