name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: "Release"
  RUNTIME: win-x64

jobs:
  # -------------------------
  # STAGE 0 — Detect changes
  # -------------------------
  detect_changes:
    name: "Stage 0 - Detect changes (code)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - name: "Detect code changes"
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "**/*.sln"
              - "**/*.csproj"
              - "**/*.cs"
              - "Directory.Build.props"
              - "Directory.Build.targets"
              - ".editorconfig"

  # -------------------------
  # STAGE 1 — Build
  # -------------------------
  build:
    name: "Stage 1 - Build"
    needs: detect_changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.detect_changes.outputs.code_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: "Setup .NET"
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Cache NuGet
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Restore"
        run: dotnet restore

      - name: "Build"
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

  # -------------------------
  # STAGE 2 — Unit tests (only if build OK)
  # -------------------------
  unit_tests:
    name: "Stage 2 - Unit tests"
    needs: [detect_changes, build]
    if: startsWith(github.ref, 'refs/tags/v') || needs.detect_changes.outputs.code_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Cache NuGet
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Restore"
        run: dotnet restore

      - name: "Test"
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-restore --verbosity normal

  # -------------------------
  # STAGE 3 — Package (.exe) (ONLY ON TAG RELEASE)
  # -------------------------
  package:
    name: "Stage 3 - Package"
    needs: unit_tests
    if: startsWith(github.ref, 'refs/tags/v') && needs.unit_tests.result == 'success'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "Clean flat output"
        shell: pwsh
        run: |
          if (Test-Path "${{ env.FLAT_DIR }}") { Remove-Item "${{ env.FLAT_DIR }}" -Recurse -Force }
          New-Item -ItemType Directory -Path "${{ env.FLAT_DIR }}" | Out-Null
      
      # --- Console ---
      - name: "Publish Console"
        run: >
          dotnet publish src/EasySave.App.Console/EasySave.App.Console.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          /p:DebugType=None
          -o ${{ env.FLAT_DIR }}
      
      # --- GUI (Avalonia) ---
      - name: "Publish GUI"
        run: >
          dotnet publish src/EasySave.App.Gui/EasySave.App.Gui.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          /p:DebugType=None
          -o ${{ env.FLAT_DIR }}
      
      # --- CryptoSoft ---
      - name: "Publish CryptoSoft"
        run: >
          dotnet publish src/CryptoSoft/CryptoSoft.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          /p:DebugType=None
          -o ${{ env.FLAT_DIR }}

      - name: "List output"
        shell: pwsh
        run: |
          Get-ChildItem "${{ env.FLAT_DIR }}" | Select-Object Name, Length

      - name: "Zip package"
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ env.FLAT_DIR }}/*" -DestinationPath "EasySave-${{ env.RUNTIME }}-flat.zip" -Force

      - name: "Upload artifact"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: EasySave-${{ env.RUNTIME }}-flat
          path: EasySave-${{ env.RUNTIME }}-flat.zip

  # -------------------------
  # STAGE 4 — GitHub Release (attach zip) (ONLY ON TAG RELEASE)
  # -------------------------
  release:
    name: "Stage 4 - GitHub Release"
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v') && needs.package.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Download artifact"
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: EasySave-${{ env.RUNTIME }}
          path: .

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: |
            EasySave-${{ env.RUNTIME }}.zip
